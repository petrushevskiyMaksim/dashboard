<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>dashboard</title>
      <script type="module" crossorigin src="/dashboard/assets/index-BLhDq4F_.js"></script>
      <link rel="stylesheet" crossorigin href="/dashboard/assets/index-ZPBCY6h3.css">
    </head>
    <body>
        <button class="open-aside-btn hidden">→</button>
        <aside class="aside">
            <button class="aside__button">☰</button>
            <div class="period-selector">
                <h3 class="period-selector__title">Period</h3>
                <select id="month-select" class="month-select">
                    <option value="0">January</option>
                    <option value="0">February</option>
                    <option value="0">March</option>
                    <option value="0">April</option>
                    <option value="0">May</option>
                    <option value="0">June</option>
                    <option value="0">July</option>
                    <option value="0">August</option>
                    <option value="0">September</option>
                    <option value="0">October</option>
                    <option value="0">November</option>
                    <option value="0">December</option>
                </select>
                <select id="year-select" class="year-select">
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item active"><button class="nav__button">Projects</button></li>
                    <li class="nav__item"><button class="nav__button">Employees</button></li>
                </ul>
            </nav>
        </aside>
        <main class="main">
            <section class="projects">
                <div class="projects__header content-header">
                    <h1>Projects</h1>
                    <div class="projects__controls">
                        <button class="projects__add-project-btn add-btn">+ Add Project</button>
                        <button class="projects__seed-data-btn add-btn">Seed Data</button>
                    </div>
                </div>
                <div class="projects__filters-container filters-container"></div>
                <table class="projects__table">
                    <thead>
                        <tr>
                            <th
                                class="sortable filterable"
                                data-sort="companyName"
                                data-filter="companyName">
                                Company Name
                                <span class="sort-icon" title="Sort">⇅</span>
                                <span class="filter-icon" title="Filter">⌕</span>
                            </th>
                            <th
                                class="sortable filterable"
                                data-sort="projectName"
                                data-filter="projectName">
                                Project Name
                                <span class="sort-icon" title="Sort">⇅</span>
                                <span class="filter-icon" title="Filter">⌕</span>
                            </th>
                            <th class="sortable" data-sort="budget">
                                Budget
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th class="sortable" data-sort="employeeCapacity">
                                Employee Capacity
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th>Employees</th>
                            <th class="sortable" data-sort="estimatedIncome">
                                Estimated Income
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="projects__total-income total-income-info">
                    <strong>Total Estimated Income:</strong>
                    <span class="total-amount positive-income">$0.00</span>
                </div>
            </section>
            <section class="employees">
                <div class="employees__header content-header">
                    <h1>Employees</h1>
                    <div class="employees__controls">
                        <button class="employees__add-project-btn add-btn">+ Add Employee</button>
                    </div>
                </div>
                <div class="employees__filters-container filters-container"></div>
                <table class="employees__table">
                    <thead>
                        <tr>
                            <th class="sortable filterable" data-sort="name" data-filter="name">
                                Name
                                <span class="sort-icon" title="Sort">⇅</span>
                                <span class="filter-icon" title="Filter">⌕</span>
                            </th>
                            <th
                                class="sortable filterable"
                                data-sort="surname"
                                data-filter="surname">
                                Surname
                                <span class="sort-icon" title="Sort">⇅</span>
                                <span class="filter-icon" title="Filter">⌕</span>
                            </th>
                            <th class="sortable" data-sort="age">
                                Age
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th
                                class="sortable filterable"
                                data-sort="position"
                                data-filter="position">
                                Positon
                                <span class="sort-icon" title="Sort">⇅</span>
                                <span class="filter-icon" title="Filter">⌕</span>
                            </th>
                            <th class="sortable" data-sort="salary">
                                Salary
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th class="sortable" data-sort="estimatedPayment">
                                Estimated Payment
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th
                                class="sortable filterable"
                                data-sort="project"
                                data-filter="project">
                                Project
                                <span class="sort-icon" title="Sort">⇅</span>
                                <span class="filter-icon" title="Filter">⌕</span>
                            </th>
                            <th class="sortable" data-sort="projectedIncome">
                                Projected Income
                                <span class="sort-icon" title="Sort">⇅</span>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </body>
</html>
